<!DOCTYPE html>
<!-- v1.0.1-prod-ready -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equalaw | Free Legal Guidance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff', 100: '#e0efff', 200: '#badbff',
                            300: '#7cc0ff', 400: '#389fff', 500: '#007bff',
                            600: '#0061cc', 700: '#004da3', 800: '#004185', 900: '#00376e',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }

        /* Morphing text animation */
        .morph-line {
            display: inline-block;
            overflow: hidden;
            position: relative;
        }
        .morph-text {
            display: inline-block;
            opacity: 0;
            transform: translateY(100%);
            animation: morphIn 0.6s ease forwards;
        }
        .morph-text.exit {
            animation: morphOut 0.4s ease forwards;
        }
        @keyframes morphIn {
            0%   { opacity: 0; transform: translateY(100%); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0);    filter: blur(0); }
        }
        @keyframes morphOut {
            0%   { opacity: 1; transform: translateY(0);    filter: blur(0); }
            100% { opacity: 0; transform: translateY(-100%); filter: blur(4px); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .pulse-ring {
            animation: pulseRing 2s ease-out infinite;
        }
        @keyframes pulseRing {
            0%   { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Prevent any scroll — single screen funnel */
        html, body { overflow: hidden; height: 100%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased h-screen flex flex-col">

    <!-- Subtle background -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute inset-0" style="background: radial-gradient(ellipse at 50% 30%, rgba(0,123,255,0.08) 0%, transparent 60%);"></div>
        <div class="absolute bottom-0 left-0 right-0 h-1/2" style="background: radial-gradient(ellipse at 50% 100%, rgba(0,123,255,0.04) 0%, transparent 50%);"></div>
    </div>

    <!-- Minimal header — NO nav links, no escape routes -->
    <header class="relative z-10 p-5 md:p-6 flex justify-between items-center max-w-5xl w-full mx-auto shrink-0">
        <div class="text-xl font-extrabold tracking-tight text-brand-600">Equalaw</div>
        <div class="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest">
            <span class="relative flex h-2 w-2">
                <span class="pulse-ring absolute inline-flex h-full w-full rounded-full bg-green-400"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            AI Active
        </div>
    </header>

    <!-- Hero — single-purpose: morph text + search bar -->
    <main class="relative z-10 flex-1 flex flex-col items-center justify-center text-center px-4 -mt-6">

        <!-- Morphing multilingual headline -->
        <div class="mb-3">
            <h1 id="morph-container" class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 tracking-tight leading-tight max-w-4xl mx-auto min-h-[3.5em] sm:min-h-[3em] flex items-center justify-center">
                <span id="morph-target" class="morph-line"></span>
            </h1>
        </div>

        <!-- Static subtitle -->
        <p class="text-base sm:text-lg md:text-xl text-slate-500 mb-8 md:mb-10 max-w-2xl leading-relaxed font-medium px-4">
            Describe your situation to our AI assistant and get clear, actionable next steps in seconds.
            <span class="text-slate-900 font-semibold">No appointments. No high fees.</span>
        </p>

        <!-- Search bar — the ONE action -->
        <form id="inquiry-form" class="w-full max-w-2xl glass-card p-2 rounded-2xl md:rounded-full shadow-[0_8px_40px_rgb(0,0,0,0.08)] flex flex-col md:flex-row items-center border border-white/60 focus-within:ring-4 focus-within:ring-brand-400/20 focus-within:border-brand-300 transition-all">
            <input
                id="legal-query"
                type="text"
                placeholder="My landlord is refusing to return my deposit..."
                class="flex-grow w-full py-4 px-5 md:px-6 rounded-xl md:rounded-l-full outline-none text-slate-800 bg-transparent text-base md:text-lg font-medium placeholder-slate-400"
                required
                autocomplete="off"
            />
            <button type="submit" class="w-full md:w-auto mt-2 md:mt-0 bg-brand-600 hover:bg-brand-700 active:scale-[0.98] text-white font-bold py-3.5 md:py-3.5 px-8 md:px-10 rounded-xl md:rounded-full transition-all flex items-center justify-center gap-2 whitespace-nowrap text-base md:text-lg shadow-lg hover:shadow-brand-500/30">
                Get Free Guidance
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <!-- Trust signals -->
        <div class="flex flex-wrap items-center justify-center gap-4 mt-8">
            <span class="text-xs font-semibold text-slate-400 flex items-center gap-1.5 bg-white/60 px-3 py-1.5 rounded-full border border-slate-200/60">
                <svg class="w-3.5 h-3.5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                100% Free
            </span>
            <span class="text-xs font-semibold text-slate-400 flex items-center gap-1.5 bg-white/60 px-3 py-1.5 rounded-full border border-slate-200/60">
                <svg class="w-3.5 h-3.5 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                Private & Secure
            </span>
            <span class="text-xs font-semibold text-slate-400 flex items-center gap-1.5 bg-white/60 px-3 py-1.5 rounded-full border border-slate-200/60">
                <svg class="w-3.5 h-3.5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Instant Results
            </span>
        </div>
    </main>

    <!-- Minimal footer — no links, no escape -->
    <footer class="relative z-10 text-center py-4 text-[10px] text-slate-400 font-medium shrink-0">
        Equalaw is a technology platform, not a law firm. Information provided does not constitute legal advice.
    </footer>

    <script>
        // --- Multilingual morphing headlines ---
        const headlines = [
            "Free, Instant Legal Guidance\nat Your Fingertips",
            "मुफ़्त, तुरंत कानूनी मार्गदर्शन\nआपकी उंगलियों पर",
            "বিনামূল্যে, তাৎক্ষণিক আইনি পরামর্শ\nআপনার নখদর্পণে",
            "ఉచిత, తక్షణ న్యాయ సలహా\nమీ చేతివేళ్ల కొనన",
            "मोफत, त्वरित कायदेशीर मार्गदर्शन\nतुमच्या बोटांच्या टोकावर",
            "இலவச, உடனடி சட்ட ஆலோசனை\nஉங்கள் விரல் நுனியில்",
            "મફત, તાત્કાલિક કાનૂની માર્ગદર્શન\nતમારી આંગળીના ટેરવે",
            "ಉಚಿತ, ತ್ವರಿತ ಕಾನೂನು ಮಾರ್ಗದರ್ಶನ\nನಿಮ್ಮ ಬೆರಳ ತುದಿಯಲ್ಲಿ",
            "സൗജന്യ, തൽക്ഷണ നിയമ ഉപദേശം\nനിങ്ങളുടെ വിരൽത്തുമ്പിൽ",
            "ମାଗଣା, ତୁରନ୍ତ ଆଇନ ମାର୍ଗଦର୍ଶନ\nଆପଣଙ୍କ ଆଙ୍ଗୁଠି ଡଗରେ",
            "ਮੁਫ਼ਤ, ਤੁਰੰਤ ਕਾਨੂੰਨੀ ਮਾਰਗਦਰਸ਼ਨ\nਤੁਹਾਡੀਆਂ ਉਂਗਲਾਂ 'ਤੇ"
        ];

        let currentIdx = 0;
        const target = document.getElementById('morph-target');

        function setHeadline(text) {
            // Replace \n with <br> for two-line display
            target.innerHTML = text.replace(/\n/g, '<br>');
            target.classList.remove('exit');
            target.classList.remove('morph-text');
            void target.offsetWidth; // force reflow
            target.classList.add('morph-text');
        }

        function cycleHeadline() {
            // Exit current
            target.classList.add('exit');
            target.classList.remove('morph-text');

            setTimeout(() => {
                currentIdx = (currentIdx + 1) % headlines.length;
                setHeadline(headlines[currentIdx]);
            }, 400);
        }

        // Initial
        setHeadline(headlines[0]);
        setInterval(cycleHeadline, 3000);

        // --- Form submission ---
        document.getElementById('inquiry-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const query = document.getElementById('legal-query').value.trim();
            if (!query) return;
            window.location.href = 'chatbot.html?query=' + encodeURIComponent(query);
        });
    </script>
</body>
</html>
