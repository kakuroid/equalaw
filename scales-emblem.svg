<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- EQUALAW Scales Emblem - faithful recreation -->
  <!-- Two mirrored trapezoidal forms with triangular cutouts, vertical center bar, base -->

  <!-- LEFT SIDE -->
  <!-- Top horizontal bar -->
  <rect x="5" y="5" width="44" height="7" fill="currentColor"/>
  <!-- Left trapezoidal body: wide at top, narrows going down-right -->
  <polygon points="5,12 42,12 42,20 35,20 20,68 5,68" fill="currentColor"/>
  <!-- Left triangular cutout (pointing up) -->
  <polygon points="15,55 26,55 23,32 18,32" fill="white" class="cutout"/>

  <!-- RIGHT SIDE (mirrored) -->
  <!-- Top horizontal bar -->
  <rect x="51" y="5" width="44" height="7" fill="currentColor"/>
  <!-- Right trapezoidal body: wide at top, narrows going down-left -->
  <polygon points="58,12 95,12 95,68 80,68 65,20 58,20" fill="currentColor"/>
  <!-- Right triangular cutout (pointing up) -->
  <polygon points="74,55 85,55 82,32 77,32" fill="white" class="cutout"/>

  <!-- CENTER VERTICAL BAR -->
  <rect x="44" y="12" width="12" height="78" fill="currentColor"/>

  <!-- BOTTOM BASE - two separate bars -->
  <rect x="5" y="85" width="40" height="10" fill="currentColor"/>
  <rect x="55" y="85" width="40" height="10" fill="currentColor"/>
</svg>