<svg viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <!-- EQUALAW Wordmark - faithful recreation of geometric letterforms -->
  <!-- Thin stroke style, each letter has unique geometric construction -->

  <g fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">

    <!-- E (x: 0-80) - Two horizontal parallel bars with vertical stroke -->
    <!-- Top bar -->
    <line x1="10" y1="30" x2="75" y2="30"/>
    <!-- Bottom bar -->
    <line x1="10" y1="90" x2="75" y2="90"/>
    <!-- Left vertical connecting stroke -->
    <line x1="10" y1="30" x2="10" y2="90"/>
    <!-- Middle bar -->
    <line x1="10" y1="60" x2="60" y2="60"/>

    <!-- Q (x: 90-175) - Circle with diagonal slash -->
    <circle cx="132" cy="60" r="30"/>
    <line x1="110" y1="82" x2="155" y2="38"/>

    <!-- U (x: 185-260) - Open U shape -->
    <path d="M195,30 L195,72 Q195,90 222,90 Q250,90 250,72 L250,30" fill="none"/>

    <!-- A (x: 265-340) - Triangle with small triangle peak -->
    <line x1="275" y1="90" x2="302" y2="30"/>
    <line x1="302" y1="30" x2="330" y2="90"/>
    <!-- Small triangle at peak (the distinctive detail from the logo) -->
    <path d="M295,42 L302,30 L309,42" fill="none"/>

    <!-- L (x: 345-420) - Vertical + horizontal with geometric style -->
    <line x1="355" y1="30" x2="355" y2="90"/>
    <line x1="355" y1="90" x2="415" y2="90"/>
    <!-- Top serif/detail -->
    <line x1="345" y1="30" x2="375" y2="30"/>

    <!-- A (x: 425-500) - Same as first A -->
    <line x1="435" y1="90" x2="462" y2="30"/>
    <line x1="462" y1="30" x2="490" y2="90"/>
    <!-- Small triangle at peak -->
    <path d="M455,42 L462,30 L469,42" fill="none"/>

    <!-- W (x: 505-600) - Two chevrons / zigzag pointing up -->
    <polyline points="515,90 535,50 555,90"/>
    <polyline points="545,90 565,50 585,90"/>
    <!-- Top chevron caps (the distinctive up-pointing detail) -->
    <polyline points="525,55 535,42 545,55"/>
    <polyline points="555,55 565,42 575,55"/>

  </g>
</svg>