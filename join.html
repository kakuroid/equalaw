<!DOCTYPE html>
<!-- Advocate onboarding v2.0.0 — conversational flow mirroring chatbot.html -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Equalaw | Advocate Onboarding</title>
    <meta name="description" content="Join Equalaw as a verified advocate and receive pre-qualified legal leads delivered to your WhatsApp. No commission. Ever.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/assets/equalaw-logo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0f7ff', 100: '#e0efff', 200: '#badbff',
                            300: '#7cc0ff', 400: '#389fff', 500: '#007bff',
                            600: '#0061cc', 700: '#004da3', 800: '#004185', 900: '#00376e',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="/assets/analytics.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, rgba(56,159,255,0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0,123,255,0.04) 0px, transparent 50%);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .glass {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .chat-bubble {
            opacity: 0;
            transform: scale(0.94) translateY(8px);
            animation: bubbleIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes bubbleIn {
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .chat-bubble { animation: none; opacity: 1; transform: none; }
            .typing-dot { animation: none !important; }
        }
        .typing-dot {
            animation: typingPulse 1.4s infinite ease-in-out both;
            background-color: #3b82f6;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .tile-btn {
            transition: all 0.15s ease;
        }
        .tile-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -4px rgba(0,123,255,0.15);
        }
        .progress-step { transition: all 0.4s ease; }
        .progress-step.active .step-dot {
            background: #007bff;
            box-shadow: 0 0 0 4px rgba(0,123,255,0.15);
            transform: scale(1.15);
        }
        .progress-step.done .step-dot { background: #10b981; }
        .progress-step.done .step-check { display: block !important; }
        .wa-btn {
            background: #25D366;
            transition: all 0.2s ease;
        }
        .wa-btn:hover { background: #20BD5C; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased text-slate-900 overflow-hidden">
    <header class="glass sticky top-0 z-50 px-4 py-3 flex justify-between items-center shrink-0 border-b border-slate-200/60">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-600 to-brand-800 flex items-center justify-center shrink-0 shadow-sm" aria-hidden="true">
                <svg width="22" height="22" viewBox="0 0 100 100">
                    <rect x="5" y="5" width="41" height="7" fill="white"/>
                    <rect x="54" y="5" width="41" height="7" fill="white"/>
                    <polygon points="5,12 40,12 40,20 33,20 18,68 5,68" fill="white"/>
                    <polygon points="14,55 24,55 21,33 17,33" fill="rgba(0,97,204,0.8)"/>
                    <polygon points="60,12 95,12 95,68 82,68 67,20 60,20" fill="white"/>
                    <polygon points="76,55 86,55 83,33 79,33" fill="rgba(0,97,204,0.8)"/>
                    <rect x="43" y="12" width="14" height="78" fill="white"/>
                    <rect x="5" y="85" width="38" height="10" fill="white"/>
                    <rect x="57" y="85" width="38" height="10" fill="white"/>
                </svg>
            </div>
            <div>
                <h1 class="text-sm font-semibold tracking-[0.18em] text-slate-900 uppercase leading-none">EQUALAW <span class="text-brand-600 font-bold normal-case tracking-normal">For Advocates</span></h1>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse" aria-hidden="true"></span>
                    <span id="header-status" class="text-[9px] uppercase tracking-widest font-bold text-slate-400" aria-live="polite">Setting up profile</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden sm:flex items-center gap-0.5 bg-slate-100/70 p-1 rounded-full border border-slate-200/60">
                <div id="step-about" class="progress-step active px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                    <span class="step-dot w-2 h-2 rounded-full bg-slate-300"><svg class="step-check w-1.5 h-1.5 text-white hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></span>
                    <span class="text-slate-600">About</span>
                </div>
                <div id="step-practice" class="progress-step px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                    <span class="step-dot w-2 h-2 rounded-full bg-slate-300"><svg class="step-check w-1.5 h-1.5 text-white hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></span>
                    <span class="text-slate-400">Practice</span>
                </div>
                <div id="step-pricing" class="progress-step px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider flex items-center gap-1.5">
                    <span class="step-dot w-2 h-2 rounded-full bg-slate-300"><svg class="step-check w-1.5 h-1.5 text-white hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg></span>
                    <span class="text-slate-400">Pricing</span>
                </div>
            </div>
            <a href="/" class="text-slate-400 hover:text-slate-700 transition-colors p-2 rounded-lg hover:bg-slate-100">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            </a>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 md:px-0 flex flex-col gap-5 max-w-2xl mx-auto w-full pb-52" aria-live="polite"></main>

    <div class="fixed bottom-0 left-0 right-0 z-40">
        <div class="bg-gradient-to-t from-slate-50 via-slate-50/95 to-transparent pt-6 px-4 pb-4 md:pb-5">
            <div class="max-w-2xl mx-auto w-full">
                <div id="input-wrapper" class="hidden glass rounded-2xl p-2 shadow-2xl border border-white/60 ring-1 ring-slate-900/5">
                    <div class="flex gap-2">
                        <textarea id="user-input" rows="1" placeholder="Type your answer..." class="flex-1 bg-transparent border-none outline-none resize-none px-4 py-3 text-slate-700 text-[15px] leading-relaxed font-medium placeholder:text-slate-400"></textarea>
                        <button id="send-btn" class="bg-brand-600 hover:bg-brand-700 text-white p-3 rounded-xl shrink-0 transition-all shadow-lg flex items-center justify-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
                <div id="tile-wrapper" class="hidden">
                    <div id="tile-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-2 max-h-56 overflow-y-auto pr-1"></div>
                    <button id="tile-continue" class="hidden w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl text-sm shadow-lg transition-all flex items-center justify-center gap-2 mt-1">
                        <span id="continue-label">Continue</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
                    </button>
                </div>
                <p class="text-[9px] text-center text-slate-400 mt-2 font-medium" aria-hidden="true">Your information is kept private and secure.</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        var session = {
            name: '', phone: '', email: '',
            bar_state: '', bar_number: '',
            experience: '', specializations: [], cities: [], languages: [],
            fee_type: '', fee_amount: null,
            _multiSelected: []
        };
        var step = 0;

        const chat = document.getElementById('chat-container');
        const inputWrap = document.getElementById('input-wrapper');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const tileWrap = document.getElementById('tile-wrapper');
        const tileGrid = document.getElementById('tile-grid');
        const tileContinue = document.getElementById('tile-continue');
        const continueLabel = document.getElementById('continue-label');

        const BOT_AVATAR = '<div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shrink-0 shadow-lg mt-0.5" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 100 100"><rect x="5" y="5" width="41" height="7" fill="white"/><rect x="54" y="5" width="41" height="7" fill="white"/><polygon points="5,12 40,12 40,20 33,20 18,68 5,68" fill="white"/><polygon points="14,55 24,55 21,33 17,33" fill="rgba(0,97,204,0.8)"/><polygon points="60,12 95,12 95,68 82,68 67,20 60,20" fill="white"/><polygon points="76,55 86,55 83,33 79,33" fill="rgba(0,97,204,0.8)"/><rect x="43" y="12" width="14" height="78" fill="white"/><rect x="5" y="85" width="38" height="10" fill="white"/><rect x="57" y="85" width="38" height="10" fill="white"/></svg></div>';
        const USER_AVATAR = '<div class="w-9 h-9 rounded-xl bg-white flex items-center justify-center shrink-0 text-slate-400 shadow-sm border border-slate-200 mt-0.5" aria-hidden="true"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>';

        function scrollDown() {
            setTimeout(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }), 60);
        }
        function botMsg(html) {
            const el = document.createElement('div');
            el.className = 'flex gap-3 max-w-[90%] chat-bubble';
            el.innerHTML = BOT_AVATAR + '<div class="glass p-4 rounded-2xl rounded-tl-none shadow-sm text-slate-700 leading-relaxed text-[14px] border border-white/80">' + html + '</div>';
            chat.appendChild(el);
            scrollDown();
        }
        function userMsg(text) {
            const el = document.createElement('div');
            el.className = 'flex flex-row-reverse gap-3 max-w-[85%] self-end chat-bubble';
            el.innerHTML = USER_AVATAR + '<div class="bg-brand-600 p-4 rounded-2xl rounded-tr-none shadow-lg text-white leading-relaxed text-[14px] font-medium">' + DOMPurify.sanitize(text) + '</div>';
            chat.appendChild(el);
            scrollDown();
        }
        function showTyping(cb, delay = 1000) {
            const el = document.createElement('div');
            el.className = 'flex gap-3 max-w-[90%] chat-bubble';
            el.innerHTML = BOT_AVATAR + '<div class="glass py-4 px-6 rounded-2xl rounded-tl-none shadow-sm flex items-center gap-1.5 h-10"><div class="w-1.5 h-1.5 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 rounded-full typing-dot"></div></div>';
            chat.appendChild(el);
            scrollDown();
            setTimeout(() => { el.remove(); if (cb) cb(); }, delay);
        }
        function setStatus(text) {
            document.getElementById('header-status').textContent = text;
        }
        function updateStepper(active, done = []) {
            done.forEach(id => {
                const el = document.getElementById(id);
                if (el) { el.classList.add('done'); el.classList.remove('active'); }
            });
            const el = document.getElementById(active);
            if (el) el.classList.add('active');
        }
        function showTextInput(placeholder, inputmode = 'text') {
            tileWrap.classList.add('hidden');
            tileGrid.innerHTML = '';
            tileContinue.classList.add('hidden');
            inputWrap.classList.remove('hidden');
            userInput.placeholder = placeholder;
            userInput.value = '';
            userInput.setAttribute('inputmode', inputmode);
            setTimeout(() => userInput.focus(), 100);
        }
        function showSingleSelect(items, callback) {
            inputWrap.classList.add('hidden');
            tileGrid.innerHTML = '';
            tileContinue.classList.add('hidden');
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'tile-btn glass px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 hover:border-brand-400 hover:bg-brand-50/50 cursor-pointer text-center';
                btn.textContent = item;
                btn.addEventListener('click', () => {
                    tileGrid.querySelectorAll('.tile-btn').forEach(b => { b.disabled = true; b.classList.add('opacity-40'); });
                    btn.classList.remove('opacity-40');
                    btn.classList.add('ring-2', 'ring-brand-400', 'bg-brand-50/70');
                    setTimeout(() => { tileWrap.classList.add('hidden'); callback(item); }, 200);
                });
                tileGrid.appendChild(btn);
            });
            tileWrap.classList.remove('hidden');
            scrollDown();
        }
        function showMultiSelect(items, callback) {
            inputWrap.classList.add('hidden');
            tileGrid.innerHTML = '';
            session._multiSelected = [];
            tileContinue.classList.add('hidden');
            items.forEach(item => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'tile-btn glass px-3 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 hover:border-brand-400 transition-all cursor-pointer text-center';
                btn.textContent = item;
                btn.addEventListener('click', () => {
                    if (btn.classList.contains('selected')) {
                        btn.classList.remove('selected', 'border-brand-500', 'bg-brand-50/70', 'ring-2', 'ring-brand-400', 'text-brand-700');
                        session._multiSelected = session._multiSelected.filter(v => v !== item);
                    } else {
                        btn.classList.add('selected', 'border-brand-500', 'bg-brand-50/70', 'ring-2', 'ring-brand-400', 'text-brand-700');
                        session._multiSelected.push(item);
                    }
                    if (session._multiSelected.length > 0) {
                        tileContinue.classList.remove('hidden');
                        continueLabel.textContent = 'Continue (' + session._multiSelected.length + ')';
                    } else {
                        tileContinue.classList.add('hidden');
                    }
                });
                tileGrid.appendChild(btn);
            });
            tileContinue.onclick = () => {
                if (session._multiSelected.length === 0) return;
                tileWrap.classList.add('hidden');
                callback([...session._multiSelected]);
            };
            tileWrap.classList.remove('hidden');
            scrollDown();
        }

        function startFlow() {
            if (typeof eqTrack === 'function') eqTrack('advocate_join_load', { utm: window.eqUtm || {} });
            botMsg('<p class="font-bold text-slate-900 mb-3 text-[15px]">The right case.<br>Right city. Right time.</p><p class="text-[13px] text-slate-600 mb-3">We match seekers to advocates across three dimensions:</p><div class="space-y-2 mb-3"><div class="flex items-start gap-2.5 text-[13px]"><span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-brand-100 text-brand-600 font-bold text-[10px] shrink-0 mt-0.5">R</span><span><strong>Role</strong> — your specialization matches their legal issue</span></div><div class="flex items-start gap-2.5 text-[13px]"><span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-brand-100 text-brand-600 font-bold text-[10px] shrink-0 mt-0.5">S</span><span><strong>Space</strong> — your cities match their location</span></div><div class="flex items-start gap-2.5 text-[13px]"><span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-brand-100 text-brand-600 font-bold text-[10px] shrink-0 mt-0.5">T</span><span><strong>Time</strong> — your availability matches their urgency</span></div></div><div class="border-t border-slate-200/60 pt-3 mt-1"><div class="flex items-center gap-2 text-[12px] text-slate-500"><svg class="w-3.5 h-3.5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>Leads arrive on WhatsApp — no chasing clients</div><div class="flex items-center gap-2 text-[12px] text-slate-500 mt-1"><svg class="w-3.5 h-3.5 text-green-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>Zero commission. You keep 100% of your fee.</div></div><p class="text-[11px] text-slate-400 mt-3">Takes about 2 minutes to set up.</p>');
            showTyping(() => {
                botMsg('<strong>Let\'s start — what\'s your full name?</strong>');
                showTextInput("e.g., Adv. Priya Sharma");
            }, 1200);
        }

        function handleName(val) {
            val = val.trim();
            if (!val || val.length < 2) return;
            session.name = val.split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            inputWrap.classList.add('hidden');
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_name', {});
            step = 1;
            showTyping(() => {
                botMsg('Hi <strong>' + DOMPurify.sanitize(session.name) + '</strong>! What\'s your <strong>WhatsApp number?</strong><br><span class="text-[12px] text-slate-500">We\'ll send leads here.</span>');
                showTextInput("10-digit mobile", "numeric");
            }, 700);
        }

        function handlePhone(val) {
            const cleaned = val.replace(/[\s\-+]/g, '').replace(/^(\+?91|0)/, '');
            if (!/^[6-9]\d{9}$/.test(cleaned)) {
                showTyping(() => {
                    botMsg('<span class="text-red-600 font-semibold">Please enter a valid 10-digit Indian number.</span>');
                    showTextInput("10-digit mobile", "numeric");
                }, 400);
                return;
            }
            session.phone = cleaned;
            userMsg(val.trim());
            inputWrap.classList.add('hidden');
            if (typeof eqTrack === 'function') eqTrack('advocate_step_phone', {});
            step = 2;
            showTyping(() => {
                botMsg('<strong>And your professional email?</strong>');
                showTextInput("your@email.com", "email");
            }, 700);
        }

        function handleEmail(val) {
            val = val.trim();
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) {
                showTyping(() => {
                    botMsg('<span class="text-red-600 font-semibold">Please enter a valid email.</span>');
                    showTextInput("your@email.com", "email");
                }, 400);
                return;
            }
            session.email = val;
            userMsg(val);
            inputWrap.classList.add('hidden');
            submitEarly();
            if (typeof eqTrack === 'function') eqTrack('advocate_lead_captured', {});
            step = 3;
            updateStepper('step-practice', ['step-about']);
            setStatus('Building profile');
            showTyping(() => {
                botMsg('Got it, <strong>' + DOMPurify.sanitize(session.name) + '</strong>! A few more details.<br><br><strong>Which state bar council?</strong>');
                showSingleSelect(['Delhi', 'Maharashtra', 'Karnataka', 'Tamil Nadu', 'Uttar Pradesh', 'Gujarat', 'Rajasthan', 'West Bengal', 'Telangana', 'Kerala', 'Other State'], handleState);
            }, 1000);
        }

        function handleState(val) {
            if (val === 'Other State') {
                userMsg(val);
                showTyping(() => {
                    botMsg('Which state? Type below.');
                    showTextInput("e.g., Odisha, Punjab");
                    step = 3.1;
                }, 500);
                return;
            }
            session.bar_state = val;
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_state', { state: val });
            step = 4;
            showTyping(() => {
                botMsg('<strong>Bar Council Enrollment Number?</strong>');
                showTextInput("e.g., MH/1234/2018");
            }, 700);
        }

        function handleStateText(val) {
            val = val.trim();
            if (!val) return;
            session.bar_state = val;
            inputWrap.classList.add('hidden');
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_state', { state: val });
            step = 4;
            showTyping(() => {
                botMsg('<strong>Bar Council Enrollment Number?</strong>');
                showTextInput("e.g., MH/1234/2018");
            }, 700);
        }

        function handleEnrollment(val) {
            val = val.trim();
            if (!val || val.length < 3) return;
            session.bar_number = val.toUpperCase();
            inputWrap.classList.add('hidden');
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_enrollment', {});
            step = 5;
            showTyping(() => {
                botMsg('<strong>How many years practising?</strong>');
                showSingleSelect(['0–2 years', '3–5 years', '6–10 years', '10+ years'], handleExperience);
            }, 700);
        }

        function handleExperience(val) {
            session.experience = val;
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_experience', {});
            step = 6;
            showTyping(() => {
                botMsg('<strong>Which areas do you practise in?</strong><br><span class="text-[12px] text-slate-500">Select all, then Continue.</span>');
                showMultiSelect(['Family Law', 'Criminal Law', 'Corporate Law', 'Real Estate', 'Labour Law', 'IP & Patents', 'Tax Law', 'Litigation', 'Consumer Rights', 'Civil Law', 'Other'], handleSpecializations);
            }, 700);
        }

        function handleSpecializations(vals) {
            session.specializations = vals;
            userMsg(vals.join(' · '));
            if (typeof eqTrack === 'function') eqTrack('advocate_step_specializations', { count: vals.length });
            step = 7;
            showTyping(() => {
                botMsg('<strong>Which cities do you serve?</strong><br><span class="text-[12px] text-slate-500">Comma-separated.</span>');
                showTextInput("e.g., Mumbai, Thane, Pune");
            }, 700);
        }

        function handleCities(val) {
            val = val.trim();
            if (!val) return;
            session.cities = val.split(',').map(c => c.trim()).filter(Boolean);
            inputWrap.classList.add('hidden');
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_cities', { count: session.cities.length });
            step = 8;
            showTyping(() => {
                botMsg('<strong>What languages do you work in?</strong><br><span class="text-[12px] text-slate-500">Select all, then Continue.</span>');
                showMultiSelect(['English', 'Hindi', 'Tamil', 'Telugu', 'Kannada', 'Malayalam', 'Marathi', 'Gujarati', 'Bengali', 'Punjabi'], handleLanguages);
            }, 700);
        }

        function handleLanguages(vals) {
            session.languages = vals;
            userMsg(vals.join(' · '));
            if (typeof eqTrack === 'function') eqTrack('advocate_step_languages', { count: vals.length });
            step = 9;
            updateStepper('step-pricing', ['step-about', 'step-practice']);
            setStatus('Almost done');
            showTyping(() => {
                botMsg('<strong>What do you charge for a consultation?</strong>');
                showSingleSelect(['Free consultation', 'I charge a fee'], handleFeeType);
            }, 700);
        }

        function handleFeeType(val) {
            const isPaid = val !== 'Free consultation';
            session.fee_type = isPaid ? 'paid' : 'free';
            userMsg(val);
            if (typeof eqTrack === 'function') eqTrack('advocate_step_fee_type', { type: session.fee_type });
            if (isPaid) {
                step = 9.5;
                showTyping(() => {
                    botMsg('<strong>How much do you charge? (₹)</strong>');
                    showTextInput("e.g., 500", "decimal");
                }, 600);
            } else {
                step = 10;
                submitFull();
            }
        }

        function handleFeeAmount(val) {
            const amount = parseInt(val.trim());
            if (!amount || amount <= 0) {
                showTyping(() => {
                    botMsg('<span class="text-red-600 font-semibold">Please enter a valid amount.</span>');
                    showTextInput("e.g., 500", "decimal");
                }, 400);
                return;
            }
            session.fee_amount = amount;
            inputWrap.classList.add('hidden');
            userMsg('₹' + amount);
            step = 10;
            submitFull();
        }

        function submitEarly() {
            const phId = window.posthog?.get_distinct_id?.() || null;
            fetch('https://keuristic.com/api/lawyers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: session.name, phone: session.phone, email: session.email,
                    status: 'partial', posthog_distinct_id: phId, utm: window.eqUtm || {}
                })
            }).catch(() => {});
        }

        function submitFull() {
            const phId = window.posthog?.get_distinct_id?.() || null;
            if (typeof eqIdentify === 'function') {
                eqIdentify(session.email, { name: session.name, phone: session.phone, type: 'advocate' });
            }
            const payload = {
                name: session.name, email: session.email, phone: session.phone,
                bar_council_number: session.bar_number, state_bar_council: session.bar_state,
                years_experience: session.experience, specializations: session.specializations,
                cities: session.cities, languages: session.languages,
                fee_type: session.fee_type, consultation_fee: session.fee_amount,
                pro_bono: false, bio: '', status: 'pending',
                posthog_distinct_id: phId, utm: window.eqUtm || {}
            };
            if (typeof eqTrack === 'function') eqTrack('advocate_application_submitted', {
                specializations: session.specializations.length, cities: session.cities.length, fee_type: session.fee_type
            });
            fetch('https://keuristic.com/api/lawyers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => showSuccess()).catch(() => showSuccess());
        }

        function showSuccess() {
            updateStepper('step-done', ['step-about', 'step-practice', 'step-pricing']);
            setStatus('Complete');
            const specs = session.specializations.slice(0, 2).join(', ') + (session.specializations.length > 2 ? ' +' + (session.specializations.length - 2) : '');
            const cities = session.cities.slice(0, 2).join(', ') + (session.cities.length > 2 ? ' +' + (session.cities.length - 2) : '');
            showTyping(() => {
                botMsg('<div class="bg-green-50 border border-green-200 rounded-xl p-3.5 mb-3"><div class="flex items-center gap-2 mb-2.5"><div class="w-8 h-8 bg-green-100 text-green-600 rounded-full flex items-center justify-center"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg></div><div><p class="text-sm font-bold">You\'re in, ' + DOMPurify.sanitize(session.name) + '!</p><p class="text-[11px] text-slate-500">We\'ll review within 24 hours.</p></div></div><div class="space-y-1 text-[12px] font-medium text-slate-600"><div class="flex gap-2"><span class="text-green-500">✓</span> WhatsApp: <strong>+91 ' + session.phone + '</strong></div><div class="flex gap-2"><span class="text-green-500">✓</span> Email: <strong>' + DOMPurify.sanitize(session.email) + '</strong></div><div class="flex gap-2"><span class="text-green-500">✓</span> Practice: <strong>' + DOMPurify.sanitize(specs) + '</strong></div><div class="flex gap-2"><span class="text-green-500">✓</span> Cities: <strong>' + DOMPurify.sanitize(cities) + '</strong></div></div></div><em class="text-[11px] text-slate-400">Save this screen.</em>');
                setTimeout(() => {
                    const card = document.createElement('div');
                    card.className = 'ml-12 chat-bubble';
                    card.innerHTML = '<div class="glass rounded-2xl p-4 border border-white/70 shadow-sm space-y-2.5"><p class="text-xs font-semibold text-slate-600">Know a colleague to join?</p><a href="https://wa.me/?text=' + encodeURIComponent('I joined Equalaw — get pre-qualified legal leads on WhatsApp, zero commission: https://equalaw.tech/join') + '" target="_blank" rel="noopener" class="wa-btn w-full flex items-center justify-center gap-2.5 text-white font-bold py-3 rounded-xl text-sm" onclick="if(typeof eqTrack=\'function\') eqTrack(\'advocate_share_click\', {})"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg> Invite Colleague</a><a href="/" class="w-full flex items-center justify-center gap-2 text-brand-600 font-bold py-2.5 rounded-xl text-sm border border-brand-200 hover:bg-brand-50">Back to Equalaw →</a></div>';
                    chat.appendChild(card);
                    scrollDown();
                }, 600);
            }, 1000);
        }

        function handleSend() {
            const val = userInput.value.trim();
            if (!val) return;
            if (step === 0) handleName(val);
            else if (step === 1) handlePhone(val);
            else if (step === 2) handleEmail(val);
            else if (step === 3.1) handleStateText(val);
            else if (step === 4) handleEnrollment(val);
            else if (step === 7) handleCities(val);
            else if (step === 9.5) handleFeeAmount(val);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });

        setTimeout(startFlow, 400);
    });
    </script>
</body>
</html>
