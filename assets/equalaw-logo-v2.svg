<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <title>Equalaw Logo Mark</title>
  <!-- Left scale pan (triangle) -->
  <path d="M 15 28 L 8 62 L 22 62 Z"/>
  <!-- Left scale column (upright posts) -->
  <rect x="10" y="10" width="3" height="18"/>
  <rect x="19" y="10" width="3" height="18"/>
  <!-- Left scale crossbar -->
  <line x1="8" y1="28" x2="24" y2="28"/>
  <!-- Left base -->
  <rect x="5" y="65" width="22" height="3"/>

  <!-- Center fulcrum -->
  <line x1="48" y1="35" x2="52" y2="35"/>
  <circle cx="50" cy="35" r="2" fill="#000"/>

  <!-- Right scale pan (triangle) -->
  <path d="M 78 28 L 78 62 L 92 62 Z"/>
  <!-- Right scale column (upright posts) -->
  <rect x="78" y="10" width="3" height="18"/>
  <rect x="87" y="10" width="3" height="18"/>
  <!-- Right scale crossbar -->
  <line x1="76" y1="28" x2="92" y2="28"/>
  <!-- Right base -->
  <rect x="73" y="65" width="22" height="3"/>

  <!-- Decorative equal sign below -->
  <line x1="35" y1="82" x2="65" y2="82"/>
  <line x1="35" y1="88" x2="65" y2="88"/>
</svg>
