<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equalaw | AI Legal Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0efff',
                            200: '#badbff',
                            300: '#7cc0ff',
                            400: '#389fff',
                            500: '#007bff',
                            600: '#0061cc',
                            700: '#004da3',
                            800: '#004185',
                            900: '#00376e',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 159, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 123, 255, 0.05) 0px, transparent 50%);
        }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .chat-bubble-bot {
            position: relative;
            transform-origin: left bottom;
            animation: bubblePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .chat-bubble-user {
            position: relative;
            transform-origin: right bottom;
            animation: bubblePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bubblePop {
            0% { opacity: 0; transform: scale(0.8) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
            background-color: #94a3b8;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .step-inactive { opacity: 0.4; filter: grayscale(1); }
        .step-active { opacity: 1; filter: none; }
    </style>
</head>
<body class="flex flex-col h-screen antialiased text-slate-900 overflow-hidden">

    <!-- Header / Nav -->
    <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center shrink-0 border-b border-slate-200/50">
        <div class="flex items-center gap-4">
            <a href="index.html" class="group flex items-center justify-center w-10 h-10 rounded-full bg-white border border-slate-200 shadow-sm hover:border-brand-300 hover:shadow-md transition-all">
                <svg class="w-5 h-5 text-slate-500 group-hover:text-brand-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900">Equalaw <span class="text-brand-600">Assistant</span></h1>
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] uppercase tracking-widest font-bold text-slate-400">AI Active</span>
                </div>
            </div>
        </div>
        
        <div class="hidden sm:flex items-center gap-2 bg-slate-100/50 p-1 rounded-full border border-slate-200/50">
            <div class="px-3 py-1 bg-white rounded-full shadow-sm text-[11px] font-bold text-slate-600 uppercase tracking-wider">Analysis</div>
            <div class="px-3 py-1 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Plan</div>
            <div class="px-3 py-1 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Connect</div>
        </div>
    </header>

    <!-- Chat Container -->
    <main id="chat-container" class="flex-1 overflow-y-auto px-4 py-8 md:px-0 flex flex-col gap-6 max-w-2xl mx-auto w-full pb-32">
        <!-- Messages will be injected here -->
    </main>

    <!-- Fixed Input Area -->
    <div class="fixed bottom-0 left-0 right-0 p-4 md:p-6 bg-gradient-to-t from-slate-50 via-slate-50 to-transparent pointer-events-none">
        <div class="max-w-2xl mx-auto w-full pointer-events-auto">
            
            <!-- User Input Block (Step Logic Driven) -->
            <div id="input-wrapper" class="hidden glass rounded-3xl p-2 shadow-2xl border border-white/50 ring-1 ring-slate-900/5 transition-all">
                <div class="flex gap-2">
                    <textarea 
                        id="user-input" 
                        rows="1" 
                        placeholder="Type your message..." 
                        class="flex-1 bg-transparent border-none outline-none resize-none px-4 py-3 text-slate-700 text-[16px] leading-relaxed font-medium placeholder:text-slate-400"
                    ></textarea>
                    <button id="send-btn" class="bg-brand-600 hover:bg-brand-700 disabled:opacity-50 text-white p-3 rounded-2xl shrink-0 transition-all shadow-lg hover:shadow-brand-500/30 flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Lead Capture Modal (Special Injection) -->
            <div id="lead-capture" class="hidden glass rounded-3xl p-6 shadow-2xl border border-white/50 ring-1 ring-slate-900/5 transition-all animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-2xl bg-brand-100 flex items-center justify-center text-brand-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-slate-900">Secure Your Action Plan</h3>
                        <p class="text-xs font-medium text-slate-500">Encrypted & Confidential Analysis</p>
                    </div>
                </div>

                <form id="lead-form" class="space-y-3">
                    <input type="text" id="cap-name" placeholder="Full Name" required class="w-full bg-white/50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all font-medium">
                    <div class="grid grid-cols-2 gap-3">
                         <input type="email" id="cap-email" placeholder="Email Address" required class="w-full bg-white/50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all font-medium">
                         <input type="tel" id="cap-tel" placeholder="Mobile Number" required class="w-full bg-white/50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all font-medium">
                    </div>
                    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/20 transition-all flex items-center justify-center gap-2 group">
                        Generate Action Path
                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                    </button>
                </form>

                <p class="text-[10px] text-center text-slate-400 mt-4 font-medium uppercase tracking-widest">No attorney-client relationship is yet formed.</p>
            </div>
            
            <p class="text-[10px] text-center text-slate-400 mt-3 font-medium">Equalaw provides information, not legal advice.</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rawQuery = urlParams.get('query');
            
            if(!rawQuery) {
                window.location.href = "index.html";
                return;
            }

            const chatContainer = document.getElementById('chat-container');
            const inputWrapper = document.getElementById('input-wrapper');
            const userInput = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const leadCapture = document.getElementById('lead-capture');
            const leadForm = document.getElementById('lead-form');

            let sessionData = {
                initialQuery: DOMPurify.sanitize(rawQuery),
                userName: "",
                details: "",
                category: "General"
            };

            let currentStep = 0; // 0: Acknowledgment, 1: Name, 2: Details, 3: Insight, 4: Lead

            // --- UI HELPERS ---

            const scrollToBottom = () => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            const appendBotMessage = (content) => {
                const msg = document.createElement('div');
                msg.className = "flex gap-4 max-w-[85%] chat-bubble-bot";
                msg.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shrink-0 text-white shadow-lg border border-brand-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="glass p-5 rounded-3xl rounded-tl-none shadow-sm text-slate-700 leading-relaxed text-[15px] border border-white/80">
                        ${content}
                    </div>
                `;
                chatContainer.appendChild(msg);
                scrollToBottom();
                return msg;
            };

            const appendUserMessage = (content) => {
                const msg = document.createElement('div');
                msg.className = "flex flex-row-reverse gap-4 max-w-[85%] self-end chat-bubble-user";
                msg.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl bg-white flex items-center justify-center shrink-0 text-slate-400 shadow-sm border border-slate-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <div class="bg-brand-600 p-5 rounded-3xl rounded-tr-none shadow-lg text-white leading-relaxed text-[15px] font-medium">
                        ${content}
                    </div>
                `;
                chatContainer.appendChild(msg);
                scrollToBottom();
            };

            const showTyping = (callback, delay = 1200) => {
                const typing = document.createElement('div');
                typing.className = "flex gap-4 max-w-[85%] chat-bubble-bot";
                typing.innerHTML = `
                    <div class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center shrink-0 text-slate-400 border border-slate-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <div class="glass py-4 px-6 rounded-3xl rounded-tl-none shadow-sm flex items-center gap-1.5 h-12">
                        <div class="w-1.5 h-1.5 rounded-full typing-dot"></div>
                        <div class="w-1.5 h-1.5 rounded-full typing-dot"></div>
                        <div class="w-1.5 h-1.5 rounded-full typing-dot"></div>
                    </div>
                `;
                chatContainer.appendChild(typing);
                scrollToBottom();

                setTimeout(() => {
                    typing.remove();
                    if(callback) callback();
                }, delay);
            };

            // --- CONVERSATION LOGIC ---

            const detectCategory = (q) => {
                const lower = q.toLowerCase();
                if(lower.includes('accident') || lower.includes('crash') || lower.includes('injury')) return "Personal Injury";
                if(lower.includes('divorce') || lower.includes('custody') || lower.includes('child')) return "Family Law";
                if(lower.includes('contract') || lower.includes('business') || lower.includes('agreement')) return "Business/Contract";
                if(lower.includes('tenant') || lower.includes('landlord') || lower.includes('rent')) return "Housing";
                return "General";
            };

            const runFlow = () => {
                if(currentStep === 0) {
                    appendBotMessage(`I've received your query: "<em>${sessionData.initialQuery}</em>".`);
                    sessionData.category = detectCategory(sessionData.initialQuery);
                    
                    showTyping(() => {
                        appendBotMessage(`Understood. I am processing this as a <strong>${sessionData.category}</strong> matter. To provide more accurate guidance, could you start by telling me your name?`);
                        inputWrapper.classList.remove('hidden');
                        inputWrapper.classList.add('flex');
                        userInput.placeholder = "My name is...";
                        userInput.focus();
                        currentStep = 1;
                    });
                }
            };

            const handleSubmission = () => {
                const val = userInput.value.trim();
                if(!val) return;

                const cleanVal = DOMPurify.sanitize(val);
                appendUserMessage(cleanVal);
                userInput.value = "";
                inputWrapper.classList.add('hidden');

                if(currentStep === 1) {
                    // Extract name loosely
                    const words = cleanVal.split(' ');
                    sessionData.userName = words.length > 0 ? words[words.length - 1].replace(/[^a-zA-Z]/g, '') : "there";
                    if(words.length > 1 && (words[0].toLowerCase() === "im" || words[0].toLowerCase() === "i'm")) sessionData.userName = words[1];
                    
                    showTyping(() => {
                        appendBotMessage(`Thanks, ${sessionData.userName}. Now, could you describe the situation in a bit more detail? For example: What happened? When did it happen? Who else is involved?`);
                        inputWrapper.classList.remove('hidden');
                        userInput.placeholder = "The situation is...";
                        userInput.focus();
                        currentStep = 2;
                    });
                } 
                else if (currentStep === 2) {
                    sessionData.details = cleanVal;
                    
                    showTyping(() => {
                        let insight = "";
                        const cat = sessionData.category;
                        
                        if(cat === "Personal Injury") insight = "The most critical factor right now is preserving evidence. Do not admit fault or sign any insurance waivers until you have an evidence log.";
                        else if(cat === "Family Law") insight = "In these matters, status quo is often protected by courts. Avoid making major changes to living arrangements or financial withdrawals without a plan.";
                        else if(cat === "Business/Contract") insight = "Strict adherence to the 'four corners' of the document is essential. Check the termination and dispute resolution clauses immediately.";
                        else insight = "Establishing a clear timeline of events is your best first move. Keep all communications in writing from this point forward.";

                        appendBotMessage(`Based on your details, ${sessionData.userName}, here is a preliminary insight:<br><br><strong>${insight}</strong><br><br>I've drafted a structured Action Path for you. To view the full analysis and get connected with verified legal support, please enter your details below.`);
                        
                        setTimeout(() => {
                            leadCapture.classList.remove('hidden');
                            scrollToBottom();
                        }, 800);
                        currentStep = 3;
                    });
                }
            };

            // --- EVENT LISTENERS ---

            sendBtn.addEventListener('click', handleSubmission);
            userInput.addEventListener('keydown', (e) => {
                if(e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSubmission();
                }
            });

            leadForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = leadForm.querySelector('button');
                btn.disabled = true;
                btn.innerHTML = `<span class="animate-spin mr-2">◌</span> Securing...`;

                const payload = {
                    name: document.getElementById('cap-name').value,
                    email: document.getElementById('cap-email').value,
                    mobile: document.getElementById('cap-tel').value,
                    query: sessionData.initialQuery,
                    category: sessionData.category,
                    details: sessionData.details,
                    _subject: `Equalaw Lead: ${sessionData.category} - ${document.getElementById('cap-name').value}`
                };

                fetch("https://formsubmit.co/ajax/shreyashkaku@gmail.com", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                })
                .then(() => {
                    leadCapture.innerHTML = `
                        <div class="text-center py-4">
                            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h3 class="text-xl font-bold text-slate-900 mb-2">Analysis Confirmed</h3>
                            <p class="text-slate-500 text-sm mb-4">Your secure Action Path has been generated and sent to your email.</p>
                            <a href="index.html" class="text-brand-600 font-bold text-sm hover:underline">Return to Home</a>
                        </div>
                    `;
                    appendBotMessage("Success. Your dedicated action path is ready. An attorney specialist will reach out to you within 24 hours to review your options.");
                })
                .catch(() => {
                    // Fallback visual success
                    leadCapture.innerHTML = `<div class='text-center py-10'>Analysis Confirmed. Check your email for next steps.</div>`;
                });
            });

            // Start the flow
            setTimeout(runFlow, 500);
        });
    </script>
</body>
</html>
